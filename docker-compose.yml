services:
  db:
    image: postgres:17-alpine
    container_name: frontend-db
    restart: unless-stopped
    ports:
      - "5662:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frontend_db
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frontend_db"]
      interval: 3s
      timeout: 3s
      retries: 20

  nginx:
    image: nginx:1.27-alpine
    container_name: msa-nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - profile-service
      - echo-service
      - community-service
      - agent-service

  profile-service:
    build: ./backend/services/profile-service
    container_name: profile-service
    environment:
      PORT: "3001"
      JWKS_URL: "http://host.docker.internal:3000/api/auth/jwks"
      JWT_ISSUER: "http://localhost:3000"
      JWT_AUDIENCE: "frontend-api"

      # NOTE:
      # profile-service는 jose.jwtVerify(..., { algorithms })로 JWT alg allowlist를 사용한다.
      # Better Auth JWT 발급을 RS256으로 바꾸면 profile-service도 RS256을 허용해야 한다.
      #
      # 근거:
      # - Better Auth JWT plugin은 JWKS로 외부 서비스 검증을 지원
      #   https://better-auth.com/docs/plugins/jwt
      # - jose jwtVerify algorithms 옵션은 허용할 JWS alg 목록
      #   https://github.com/panva/jose/blob/main/docs/jwt/verify/interfaces/JWTVerifyOptions.md
      JWT_ALGS: "RS256"
    expose:
      - "3001"

  echo-service:
    build: ./backend/services/echo-service
    container_name: echo-service
    environment:
      PORT: "3002"
      PROFILE_BASE_URL: "http://profile-service:3001"
    expose:
      - "3002"

  community-db:
    image: postgres:17-alpine
    container_name: community-db
    ports:
      - "5663:5432"
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    volumes:
      - community_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:latest
    container_name: community-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:4-management
    container_name: community-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  minio:
    image: quay.io/minio/minio:latest
    container_name: community-minio
    ports:
      - "8900:8900"
      - "8901:8901"
    environment:
      MINIO_ROOT_USER: demo
      MINIO_ROOT_PASSWORD: demo12345
    command: server /data --address ":8900" --console-address ":8901"
    volumes:
      - minio_data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: community-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:8900 demo demo12345; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb --ignore-existing local/pickle-post-images;
      exit 0;
      "


  qdrant:
    image: qdrant/qdrant:latest
    container_name: agent-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  agent-service:
    build: ./backend/services/agent-service
    container_name: agent-service
    depends_on:
      - qdrant
    env_file:
      - ./backend/services/agent-service/.env
    environment:
      - LANGGRAPH_CLI_NO_ANALYTICS=1
      - JWKS_URL=http://host.docker.internal:3000/api/auth/jwks
      - JWT_ISSUER=http://localhost:3000
      - JWT_AUDIENCE=frontend-api
      - JWT_ALGORITHM=RS256
      - QDRANT_URL=http://qdrant:6333
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "2024"

  community-service:
    build: ./backend/services/community-service
    container_name: community-service
    depends_on:
      - community-db
      - redis
      - rabbitmq
      - minio-init
    environment:
      - DB_HOST=community-db
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - S3_ENDPOINT=http://minio:8900
      - JWKS_URL=http://host.docker.internal:3000/api/auth/jwks
      - JWT_ISSUER=http://localhost:3000
      - JWT_AUDIENCE=frontend-api
    expose:
      - "8080"

volumes:
  postgres_data:
  community_postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
