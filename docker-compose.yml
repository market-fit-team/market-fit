services:
  frontend-db:
    image: postgres:17-alpine
    container_name: frontend-db
    restart: unless-stopped
    ports:
      - "5662:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frontend_db
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frontend_db"]
      interval: 3s
      timeout: 3s
      retries: 20


  authentik-db:
    image: postgres:17-alpine
    container_name: authentik-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${PG_PASS:-authentik}
      TZ: Asia/Seoul
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 3s
      timeout: 3s
      retries: 20

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.5}
    container_name: authentik-server
    restart: unless-stopped
    command: server
    ports:
      - "${AUTHENTIK_HTTP_PORT:-9000}:9000"
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-dev-authentik-secret-key-change-me-please-32chars}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS:-authentik}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@example.com}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-authentik}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-dev-authentik-bootstrap-token-change-me}
    volumes:
      - ./backend/authentik/blueprints/pickle-web.yaml:/blueprints/pickle-web.yaml:ro
    depends_on:
      authentik-db:
        condition: service_healthy

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.5}
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    env_file:
      - .env
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-dev-authentik-secret-key-change-me-please-32chars}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS:-authentik}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/authentik/blueprints/pickle-web.yaml:/blueprints/pickle-web.yaml:ro
    depends_on:
      authentik-db:
        condition: service_healthy

  traefik:
    image: traefik:v3.7.5
    container_name: traefik
    command:
      - --entrypoints.web.address=:8088
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "8088:8088"
      - "8089:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.api-cors.headers.accesscontrolalloworiginlist=http://localhost:3000,http://127.0.0.1:3000
      - traefik.http.middlewares.api-cors.headers.accesscontrolallowmethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
      - traefik.http.middlewares.api-cors.headers.accesscontrolallowheaders=Authorization,Content-Type,X-CSRF-Token
      - traefik.http.middlewares.api-cors.headers.accesscontrolmaxage=86400
      - traefik.http.middlewares.api-cors.headers.addvaryheader=true

  profile-service:
    build: ./backend/services/profile-service
    container_name: profile-service
    environment:
      PORT: "3001"
      JWKS_URL: "http://authentik-server:9000/application/o/pickle-web/jwks/"
      JWT_ISSUER: "http://localhost:9000/application/o/pickle-web/"
      JWT_AUDIENCE: "pickle-web"
      JWT_ALGS: "RS256"
    expose:
      - "3001"
    labels:
      - traefik.enable=true
      - traefik.http.routers.profile.rule=PathPrefix(`/api/profile`)
      - traefik.http.routers.profile.entrypoints=web
      - traefik.http.routers.profile.middlewares=profile-strip,api-cors
      - traefik.http.middlewares.profile-strip.stripprefix.prefixes=/api/profile
      - traefik.http.services.profile.loadbalancer.server.port=3001
      - app.api.enabled=true
      - app.api.name=profile
      - app.api.publicPath=/api/profile
      - app.api.openapiPath=/v3/api-docs
      - app.api.schemasType=zod

  echo-service:
    build: ./backend/services/echo-service
    container_name: echo-service
    environment:
      PORT: "3002"
      PROFILE_BASE_URL: "http://profile-service:3001"
    expose:
      - "3002"
    labels:
      - traefik.enable=true
      - traefik.http.routers.echo.rule=PathPrefix(`/api/echo`)
      - traefik.http.routers.echo.entrypoints=web
      - traefik.http.routers.echo.middlewares=echo-strip,api-cors
      - traefik.http.middlewares.echo-strip.stripprefix.prefixes=/api/echo
      - traefik.http.services.echo.loadbalancer.server.port=3002
      - app.api.enabled=true
      - app.api.name=echo
      - app.api.publicPath=/api/echo
      - app.api.openapiPath=/v3/api-docs
      - app.api.schemasType=zod

  community-db:
    image: postgres:17-alpine
    container_name: community-db
    ports:
      - "5663:5432"
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    volumes:
      - community_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:latest
    container_name: community-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:4-management
    container_name: community-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  minio:
    image: quay.io/minio/minio:latest
    container_name: community-minio
    ports:
      - "8900:8900"
      - "8901:8901"
    environment:
      MINIO_ROOT_USER: demo
      MINIO_ROOT_PASSWORD: demo12345
    command: server /data --address ":8900" --console-address ":8901"
    volumes:
      - minio_data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: community-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:8900 demo demo12345; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb --ignore-existing local/pickle-post-images;
      exit 0;
      "

  agent-service:
    build: ./backend/services/agent-service
    container_name: agent-service
    env_file:
      - ./backend/services/agent-service/.env
    environment:
      - LANGGRAPH_CLI_NO_ANALYTICS=1
      - FF_V2_EVENT_STREAMING=true
      - JWKS_URL=http://authentik-server:9000/application/o/pickle-web/jwks/
      - JWT_ISSUER=http://localhost:9000/application/o/pickle-web/
      - JWT_AUDIENCE=pickle-web
      - JWT_ALGORITHM=RS256
    expose:
      - "2024"
    labels:
      - traefik.enable=true
      - traefik.http.routers.agent.rule=PathPrefix(`/api/agent`)
      - traefik.http.routers.agent.entrypoints=web
      - traefik.http.routers.agent.middlewares=agent-strip,api-cors
      - traefik.http.middlewares.agent-strip.stripprefix.prefixes=/api/agent
      - traefik.http.services.agent.loadbalancer.server.port=2024
      - app.api.enabled=true
      - app.api.name=agent
      - app.api.publicPath=/api/agent
      - app.api.openapiPath=/openapi.json
      - app.api.schemasType=typescript
    depends_on:
      - authentik-server

  community-service:
    build: ./backend/services/community-service
    container_name: community-service
    depends_on:
      community-db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      authentik-server:
        condition: service_started
    environment:
      - DB_HOST=community-db
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - S3_ENDPOINT=http://minio:8900
      - JWKS_URL=http://authentik-server:9000/application/o/pickle-web/jwks/
      - JWT_ISSUER=http://localhost:9000/application/o/pickle-web/
      - JWT_AUDIENCE=pickle-web
    expose:
      - "8080"
    labels:
      - traefik.enable=true
      - traefik.http.routers.community.rule=PathPrefix(`/api/community`)
      - traefik.http.routers.community.entrypoints=web
      - traefik.http.routers.community.middlewares=community-strip,api-cors
      - traefik.http.middlewares.community-strip.stripprefix.prefixes=/api/community
      - traefik.http.services.community.loadbalancer.server.port=8080
      - app.api.enabled=true
      - app.api.name=community
      - app.api.publicPath=/api/community
      - app.api.openapiPath=/v3/api-docs
      - app.api.schemasType=zod

volumes:
  postgres_data:
  authentik_postgres_data:
  community_postgres_data:
  redis_data:
  minio_data:
