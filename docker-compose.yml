services:
  frontend-db:
    image: postgres:17-alpine
    container_name: frontend-db
    restart: unless-stopped
    ports:
      - "5662:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frontend_db
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frontend_db"]
      interval: 3s
      timeout: 3s
      retries: 20

  keycloak-db:
    image: postgres:17-alpine
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      TZ: Asia/Seoul
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 3s
      timeout: 3s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: keycloak
    entrypoint: ["/bin/sh", "/opt/keycloak/import-template/render-realm.sh"]
    command: ["start-dev", "--import-realm"]
    ports:
      - "8180:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      PICKLE_WEB_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-pickle-web-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-CHANGE_ME}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-CHANGE_ME}
    volumes:
      - ./backend/keycloak/import:/opt/keycloak/import-template:ro
    depends_on:
      keycloak-db:
        condition: service_healthy

  consul:
    image: hashicorp/consul:1.21
    container_name: consul
    command: >
      agent -dev
      -client=0.0.0.0
      -config-dir=/consul/config
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    volumes:
      - ./backend/consul/config:/consul/config
    depends_on:
      - profile-service
      - echo-service
      - community-service
      - agent-service

  discovery-service:
    build: ./backend/services/discovery-service
    container_name: discovery-service
    environment:
      PORT: "8090"
      CONSUL_HTTP_ADDR: "http://consul:8500"
      PUBLIC_DISCOVERY_ORIGIN: "http://localhost:8090"
    ports:
      - "8090:8090"
    depends_on:
      - consul

  api-edge:
    build: ./backend/services/api-edge
    container_name: api-edge
    environment:
      PORT: "8088"
      DISCOVERY_INTERNAL_ORIGIN: "http://discovery-service:8090"
      ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    ports:
      - "8088:8088"
    depends_on:
      - discovery-service

  profile-service:
    build: ./backend/services/profile-service
    container_name: profile-service
    environment:
      PORT: "3001"
      JWKS_URL: "http://keycloak:8080/realms/pickle/protocol/openid-connect/certs"
      JWT_ISSUER: "http://localhost:8180/realms/pickle"
      JWT_AUDIENCE: "pickle-api"
      JWT_ALGS: "RS256"
    expose:
      - "3001"
    depends_on:
      - keycloak

  echo-service:
    build: ./backend/services/echo-service
    container_name: echo-service
    environment:
      PORT: "3002"
      PROFILE_BASE_URL: "http://profile-service:3001"
    expose:
      - "3002"
    depends_on:
      - profile-service

  community-db:
    image: postgres:17-alpine
    container_name: community-db
    ports:
      - "5663:5432"
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    volumes:
      - community_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:latest
    container_name: community-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:4-management
    container_name: community-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  minio:
    image: quay.io/minio/minio:latest
    container_name: community-minio
    ports:
      - "8900:8900"
      - "8901:8901"
    environment:
      MINIO_ROOT_USER: demo
      MINIO_ROOT_PASSWORD: demo12345
    command: server /data --address ":8900" --console-address ":8901"
    volumes:
      - minio_data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: community-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:8900 demo demo12345; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb --ignore-existing local/pickle-post-images;
      exit 0;
      "

  agent-service:
    build: ./backend/services/agent-service
    container_name: agent-service
    env_file:
      - ./backend/services/agent-service/.env
    environment:
      - LANGGRAPH_CLI_NO_ANALYTICS=1
      - FF_V2_EVENT_STREAMING=true
      - JWKS_URL=http://keycloak:8080/realms/pickle/protocol/openid-connect/certs
      - JWT_ISSUER=http://localhost:8180/realms/pickle
      - JWT_AUDIENCE=pickle-api
      - JWT_ALGORITHM=RS256
    expose:
      - "2024"
    depends_on:
      - keycloak

  community-service:
    build: ./backend/services/community-service
    container_name: community-service
    depends_on:
      community-db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
    environment:
      - DB_HOST=community-db
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - S3_ENDPOINT=http://minio:8900
      - JWKS_URL=http://keycloak:8080/realms/pickle/protocol/openid-connect/certs
      - JWT_ISSUER=http://localhost:8180/realms/pickle
      - JWT_AUDIENCE=pickle-api
    expose:
      - "8080"

volumes:
  postgres_data:
  keycloak_postgres_data:
  community_postgres_data:
  redis_data:
  minio_data:
