# backend/nginx/nginx.conf

events {}

http {
  # 허용할 브라우저 Origin만 명시
  map $http_origin $cors_origin {
    default "";
    "http://localhost:3000" $http_origin;
  }

  upstream profile_upstream {
    server profile-service:3001;
  }

  upstream echo_upstream {
    server echo-service:3002;
  }

  upstream community_upstream {
    server community-service:8080;
  }

  upstream agent_upstream {
    server agent-service:2024;
  }

  server {
    listen 80;

    # CORS 응답 헤더
    # add_header는 if 안에 넣지 않는다.
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
    add_header Access-Control-Max-Age 86400 always;
    add_header Vary "Origin" always;

    location /api/profile/ {
      # preflight는 여기서 종료
      # location 안 if는 return만 사용
      if ($request_method = OPTIONS) {
        return 204;
      }

      # CORS는 nginx gateway 한 곳에서만 책임지게 한다.
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Allow-Credentials;

      proxy_pass http://profile_upstream/;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/echo/ {
      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Allow-Credentials;

      proxy_pass http://echo_upstream/;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/community/ {
      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Allow-Credentials;

      proxy_pass http://community_upstream/;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/agent/ {
      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Allow-Credentials;

      proxy_pass http://agent_upstream/;

      # LangGraph runs/stream SSE가 중간에서 버퍼링되지 않게 한다.
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization;
    }
  }
}
