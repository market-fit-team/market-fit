spring:
  config:
    import: optional:file:.env[.properties] # NOTE: .env 파일을 읽어 환경 변수로 사용

  application:
    name: server

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 45MB

  datasource:
    url: jdbc:postgresql://${DB_HOST:community-db}:5432/demo
    username: demo
    password: demo

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        concurrency: 1
        max-concurrency: 3
        default-requeue-rejected: false

  jpa:
    hibernate:
      ddl-auto: validate # NOTE: [Hibernate] Entity 구조와 실제 DB 스키마 검증 모드로 전환
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true # NOTE: [Flyway] 마이그레이션 도구 활성화
    locations: classpath:db/migration # NOTE: [Flyway] 버전 SQL 보관 경로 지정
    validate-on-migrate: true # NOTE: [Flyway] 기존 파일 무결성 및 체크섬 검증 수행
    baseline-on-migrate: true # NOTE: 기존 비어있지 않은 스키마를 Flyway 기준점으로 등록
    baseline-version: 0 # NOTE: baseline 후 V1부터 적용되도록 기준 버전 고정

  data:
    redis:
      host: ${REDIS_HOST:localhost} # NOTE: .env 파일 또는 환경 변수에서 호스트 읽기 (기본값 localhost)
      port: ${REDIS_PORT:6379} # NOTE: 포트 (기본값 6379)
      password: ${REDIS_PASSWORD:} # NOTE: 비밀번호 (기본값 없음)
      timeout: 3s

  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URL:http://host.docker.internal:3000/api/auth/jwks}

storage:
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:8900}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:pickle-post-images}
    access-key: ${S3_ACCESS_KEY:demo}
    secret-key: ${S3_SECRET_KEY:demo12345}
    path-style-access: ${S3_PATH_STYLE_ACCESS:true}
    presigned-url-expiration-seconds: ${S3_PRESIGNED_URL_EXPIRATION_SECONDS:600}

server:
  port: 8080
  forward-headers-strategy: framework # NOTE: 프록시 서버(Nginx 등) 뒤에 있을 때 헤더 처리를 위함



