spring:
  application:
    name: demo-test

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:18001/realms/pickle/protocol/openid-connect/certs

app:
  auth:
    jwt:
      issuer: http://localhost:8180/realms/pickle
      audience: pickle-api
