spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: market-service

  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:backend-db}:${DB_PORT:5432}/${DB_NAME:market}
    username: ${DB_USERNAME:market}
    password: ${DB_PASSWORD:market}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: true
    baseline-version: 0

springdoc:
  default-produces-media-type: application/json

server:
  port: 8080
  forward-headers-strategy: framework

market:
  data-import:
    enabled: ${MARKET_DATA_IMPORT_ENABLED:false}
    directory: ${MARKET_DATA_IMPORT_DIRECTORY:/app/data}
  boundary-import:
    enabled: ${MARKET_BOUNDARY_IMPORT_ENABLED:false}
    directory: ${MARKET_BOUNDARY_IMPORT_DIRECTORY:/app/data}
  # 상권 프랜차이즈 추천에서 franchise-service 브랜드 API를 호출한다(도커 네트워크 서비스명).
  franchise:
    base-url: ${FRANCHISE_BASE_URL:http://franchise-service:8080}
    recommend-size: ${MARKET_FRANCHISE_RECOMMEND_SIZE:10}
    # franchise-service가 느리거나 멈춰도 리포트 응답이 무한 대기하지 않도록 타임아웃(ms)을 둔다.
    connect-timeout-ms: ${MARKET_FRANCHISE_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${MARKET_FRANCHISE_READ_TIMEOUT_MS:3000}
