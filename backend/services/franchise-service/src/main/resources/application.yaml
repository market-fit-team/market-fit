spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: franchise-service

  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:backend-db}:${DB_PORT:5432}/${DB_NAME:franchise}
    username: ${DB_USERNAME:franchise}
    password: ${DB_PASSWORD:franchise}

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: true
    baseline-version: 0

springdoc:
  default-produces-media-type: application/json

server:
  port: 8080
  forward-headers-strategy: framework

franchise:
  ingest:
    enabled: ${FRANCHISE_INGEST_ENABLED:false}
    base-year: ${FRANCHISE_INGEST_YEAR:2025}
    num-of-rows: ${FRANCHISE_INGEST_NUM_OF_ROWS:1000}
    result-type: ${FRANCHISE_INGEST_RESULT_TYPE:json}
    max-retries: ${FRANCHISE_INGEST_MAX_RETRIES:3}
  api:
    startup-cost:
      url: https://apis.data.go.kr/1130000/FftcBrandFntnStatsService/getBrandFntnStats
      service-key: ${STARTUP_COST_SERVICE_KEY:}
    sales-stats:
      url: https://apis.data.go.kr/1130000/FftcBrandFrcsStatsService/getBrandFrcsStats
      service-key: ${BRAND_FRCS_STATUS_SERVICE_KEY:}
