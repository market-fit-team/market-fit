spring:
  application:
    name: post-service
  datasource:
    url: ${POST_DB_URL:jdbc:postgresql://localhost:5432/post}
    username: ${POST_DB_USERNAME:post}
    password: ${POST_DB_PASSWORD:post}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: ${POST_DB_MIGRATION_LOCATION:classpath:db/migration}
    validate-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URL:http://localhost:9000/application/o/pickle-web/jwks/}

app:
  auth:
    issuer: ${JWT_ISSUER:http://localhost:9000/application/o/pickle-web/}
    audience: ${JWT_AUDIENCE:pickle-web}
  notification:
    exchange: ${POST_NOTIFICATION_EXCHANGE:pickly.events.exchange}
    mode: ${POST_NOTIFICATION_MODE:NOOP}
  post:
    crawling:
      default-url: ${POST_CRAWL_DEFAULT_URL:}
      seed-urls:
        - "https://search.hankyung.com/search/news?query=%EC%B0%BD%EC%97%85&sort=DATE%2FDESC%2CRANK%2FDESC&period=WEEK&area=ALL&exact=&include=&except=&hk_only="
        - "https://search.hankyung.com/search/news?query=%ED%94%84%EB%A0%8C%EC%B0%A8%EC%9D%B4%EC%A6%88"
        - "https://search.hankyung.com/search/news?query=%EC%83%81%EA%B0%80"
      timeout-seconds: ${POST_CRAWL_TIMEOUT_SECONDS:10}
      article-delay-millis: ${POST_CRAWL_ARTICLE_DELAY_MILLIS:300}
      max-input-characters: ${POST_CRAWL_MAX_INPUT_CHARACTERS:12000}
    llm:
      provider: ${POST_LLM_PROVIDER:OPENAI}
      api-key: ${OPENAI_API_KEY:}
      model: ${POST_LLM_MODEL:gpt-4o-mini}
      timeout-seconds: ${POST_LLM_TIMEOUT_SECONDS:30}

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

springdoc:
  default-produces-media-type: application/json
