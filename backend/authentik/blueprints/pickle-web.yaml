# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json

version: 1

metadata:
  name: pickle-web-authentik-bootstrap
  labels:
    blueprints.goauthentik.io/instantiate: "true"
    blueprints.goauthentik.io/description: Pickle Web OIDC provider, Google OAuth source, 서비스롤키 부트스트랩

entries:
  # 내부 MSA가 authentik 사용자 DB CRUD API를 호출할 때 쓰는 서비스롤입니다.
  # role.permissions는 사용자 생성/조회/수정/삭제 global permission을 직접 부여합니다.
  # initialpermissions는 새 객체에 대한 object-level permission 자동 부여용이라 여기서는 쓰지 않습니다.
  - model: authentik_rbac.role
    state: present
    identifiers:
      name: msa-user-api-manager
    id: msa-user-api-manager-role
    attrs:
      name: msa-user-api-manager
      managed: pickle-web/msa-user-api-manager
      permissions:
        - authentik_core.add_user
        - authentik_core.view_user
        - authentik_core.change_user
        - authentik_core.delete_user

  # AUTHENTIK_SERVICE_ROLE_KEY를 사용할 내부 서비스 계정입니다.
  - model: authentik_core.user
    state: present
    identifiers:
      username: svc-msa-user-api
    id: msa-user-api-service-account
    attrs:
      username: svc-msa-user-api
      name: MSA User API Service Account
      email: svc-msa-user-api@localhost
      is_active: true
      type: service_account
      path: goauthentik.io/service-accounts
      roles:
        - !KeyOf msa-user-api-manager-role

  # .env의 AUTHENTIK_SERVICE_ROLE_KEY 값을 그대로 authentik API 토큰 key로 부트스트랩합니다.
  # MSA는 이 값을 Authorization: Bearer ${AUTHENTIK_SERVICE_ROLE_KEY} 형태로 사용합니다.
  - model: authentik_core.token
    state: present
    identifiers:
      identifier: msa-user-api-token
    attrs:
      identifier: msa-user-api-token
      intent: api
      user: !KeyOf msa-user-api-service-account
      expiring: false
      description: 내부 MSA용 authentik 사용자 CRUD API 서비스롤키
      key: !Env AUTHENTIK_SERVICE_ROLE_KEY

  - model: authentik_policies_expression.expressionpolicy
    state: present
    identifiers:
      name: pickle-web-google-set-username-from-email
    id: pickle-web-google-set-username-from-email
    attrs:
      expression: |
        email = request.context["prompt_data"]["email"]
        request.context["prompt_data"]["username"] = email
        return False

  - model: authentik_flows.flowstagebinding
    state: present
    identifiers:
      target: !Find [authentik_flows.flow, [slug, default-source-enrollment]]
      stage:
        !Find [
          authentik_stages_prompt.promptstage,
          [name, default-source-enrollment-prompt],
        ]
      order: 0
    id: default-source-enrollment-prompt-binding

  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !KeyOf default-source-enrollment-prompt-binding
      policy: !KeyOf pickle-web-google-set-username-from-email
      order: -1

  # Google OAuth 소스
  - model: authentik_sources_oauth.oauthsource
    state: present
    identifiers:
      slug: google
    attrs:
      name: Google
      slug: google
      enabled: true
      provider_type: google

      consumer_key: !Env GOOGLE_CLIENT_ID
      consumer_secret: !Env GOOGLE_CLIENT_SECRET

      authentication_flow:
        !Find [authentik_flows.flow, [slug, default-source-authentication]]
      enrollment_flow:
        !Find [authentik_flows.flow, [slug, default-source-enrollment]]

      policy_engine_mode: any
      promoted: true
      user_matching_mode: email_link
      user_path_template: goauthentik.io/sources/%(slug)s

  # Pickle Web Google 우선 인증 플로우
  - model: authentik_flows.flow
    state: present
    identifiers:
      slug: pickle-web-google-authentication
    id: pickle-web-google-authentication-flow
    attrs:
      name: pickle-web-google-authentication
      title: Continue with Google
      designation: authentication

  - model: authentik_flows.flowstagebinding
    state: absent
    identifiers:
      target: !KeyOf pickle-web-google-authentication-flow
      stage:
        !Find [
          authentik_stages_identification.identificationstage,
          [name, pickle-web-google-identification],
        ]
      order: 10

  - model: authentik_stages_identification.identificationstage
    state: absent
    identifiers:
      name: pickle-web-google-identification

  - model: authentik_stages_redirect.redirectstage
    state: present
    identifiers:
      name: pickle-web-google-redirect
    id: pickle-web-google-redirect
    attrs:
      keep_context: true
      mode: static
      target_static: /source/oauth/login/google/

  - model: authentik_stages_user_login.userloginstage
    state: present
    identifiers:
      name: pickle-web-google-login
    id: pickle-web-google-login

  # Pickle Web 사용자 프로필 claim
  - model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      managed: pickle-web/oauth-scope-user-profile
    id: pickle-web-user-profile-scope
    attrs:
      managed: pickle-web/oauth-scope-user-profile
      name: pickle-web-user-profile
      scope_name: user_profile
      description: Pickle Web 사용자 UUID와 프로필 claim
      expression: |
        return {
            "user_profile": {
                "uuid": str(request.user.uuid),
                "display_name": request.user.attributes.get("display_name"),
                "age": request.user.attributes.get("age"),
                "job": request.user.attributes.get("job"),
                "avatar_seed": request.user.attributes.get("avatar_seed"),
            }
        }

  - model: authentik_flows.flowstagebinding
    state: present
    identifiers:
      target: !KeyOf pickle-web-google-authentication-flow
      stage: !KeyOf pickle-web-google-redirect
      order: 10

  - model: authentik_flows.flowstagebinding
    state: present
    identifiers:
      target: !KeyOf pickle-web-google-authentication-flow
      stage: !KeyOf pickle-web-google-login
      order: 100

  # Pickle Web OIDC Provider
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: pickle-web
    attrs:
      name: pickle-web
      authentication_flow:
        !Find [authentik_flows.flow, [slug, pickle-web-google-authentication]]
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, default-provider-authorization-implicit-consent],
        ]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      client_type: confidential
      client_id: pickle-web
      client_secret: !Env AUTHENTIK_CLIENT_SECRET

      issuer_mode: per_provider
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      # JWKS 기반으로 검증할 수 있도록 OAuth2/OIDC 토큰 서명 키를 명시한다.
      signing_key:
        !Find [
          authentik_crypto.certificatekeypair,
          [name, authentik Self-signed Certificate],
        ]

      grant_types:
        - authorization_code
        - refresh_token

      redirect_uris:
        - url: http://localhost:3000/api/auth/oauth2/callback/authentik
          matching_mode: strict

      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]
        - !KeyOf pickle-web-user-profile-scope

  # Pickle Web 애플리케이션
  - model: authentik_core.application
    state: present
    identifiers:
      slug: pickle-web
    attrs:
      name: Pickle Web
      slug: pickle-web
      launch_url: http://localhost:3000
      policy_engine_mode: any
      provider:
        !Find [authentik_providers_oauth2.oauth2provider, [name, pickle-web]]

  # 기본 로그인 페이지에 Google 소스 표시
  - model: authentik_stages_identification.identificationstage
    state: present
    identifiers:
      name: default-authentication-identification
    attrs:
      sources:
        - !Find [authentik_sources_oauth.oauthsource, [slug, google]]
      show_source_labels: true
