# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json

version: 1

metadata:
  name: pickle-web-authentik-bootstrap
  labels:
    blueprints.goauthentik.io/instantiate: "true"
    blueprints.goauthentik.io/description: Bootstrap Pickle Web OIDC provider and Google OAuth source

entries:
  - model: authentik_policies_expression.expressionpolicy
    state: present
    identifiers:
      name: pickle-web-google-set-username-from-email
    id: pickle-web-google-set-username-from-email
    attrs:
      expression: |
        email = request.context["prompt_data"]["email"]
        request.context["prompt_data"]["username"] = email
        return False

  - model: authentik_flows.flowstagebinding
    state: present
    identifiers:
      target: !Find [authentik_flows.flow, [slug, default-source-enrollment]]
      stage: !Find [authentik_stages_prompt.promptstage, [name, default-source-enrollment-prompt]]
      order: 0
    id: default-source-enrollment-prompt-binding

  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !KeyOf default-source-enrollment-prompt-binding
      policy: !KeyOf pickle-web-google-set-username-from-email
      order: -1

  # Google OAuth Source
  - model: authentik_sources_oauth.oauthsource
    state: present
    identifiers:
      slug: google
    attrs:
      name: Google
      slug: google
      enabled: true
      provider_type: google

      consumer_key: !Env GOOGLE_CLIENT_ID
      consumer_secret: !Env GOOGLE_CLIENT_SECRET

      authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]
      enrollment_flow: !Find [authentik_flows.flow, [slug, default-source-enrollment]]

      policy_engine_mode: any
      promoted: true
      user_matching_mode: email_link
      user_path_template: goauthentik.io/sources/%(slug)s

  # Pickle Web source-first authentication flow
  - model: authentik_flows.flow
    state: present
    identifiers:
      slug: pickle-web-google-authentication
    id: pickle-web-google-authentication-flow
    attrs:
      name: pickle-web-google-authentication
      title: Continue with Google
      designation: authentication

  - model: authentik_flows.flowstagebinding
    state: absent
    identifiers:
      target: !KeyOf pickle-web-google-authentication-flow
      stage: !Find [authentik_stages_identification.identificationstage, [name, pickle-web-google-identification]]
      order: 10

  - model: authentik_stages_identification.identificationstage
    state: absent
    identifiers:
      name: pickle-web-google-identification

  - model: authentik_stages_redirect.redirectstage
    state: present
    identifiers:
      name: pickle-web-google-redirect
    id: pickle-web-google-redirect
    attrs:
      keep_context: true
      mode: static
      target_static: /source/oauth/login/google/

  - model: authentik_stages_user_login.userloginstage
    state: present
    identifiers:
      name: pickle-web-google-login
    id: pickle-web-google-login

  - model: authentik_flows.flowstagebinding
    state: present
    identifiers:
      target: !KeyOf pickle-web-google-authentication-flow
      stage: !KeyOf pickle-web-google-redirect
      order: 10

  - model: authentik_flows.flowstagebinding
    state: present
    identifiers:
      target: !KeyOf pickle-web-google-authentication-flow
      stage: !KeyOf pickle-web-google-login
      order: 100

  # Pickle Web OIDC Provider
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: pickle-web
    attrs:
      name: pickle-web
      authentication_flow: !Find [authentik_flows.flow, [slug, pickle-web-google-authentication]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      client_type: confidential
      client_id: pickle-web
      client_secret: !Env AUTHENTIK_CLIENT_SECRET

      issuer_mode: per_provider
      sub_mode: hashed_user_id
      include_claims_in_id_token: true

      grant_types:
        - authorization_code
        - refresh_token

      redirect_uris:
        - url: http://localhost:3000/api/auth/oauth2/callback/authentik
          matching_mode: strict

      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]

  # Pickle Web Application
  - model: authentik_core.application
    state: present
    identifiers:
      slug: pickle-web
    attrs:
      name: Pickle Web
      slug: pickle-web
      launch_url: http://localhost:3000
      policy_engine_mode: any
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, pickle-web]]

  # Show Google Source on default login page
  - model: authentik_stages_identification.identificationstage
    state: present
    identifiers:
      name: default-authentication-identification
    attrs:
      sources:
        - !Find [authentik_sources_oauth.oauthsource, [slug, google]]
      show_source_labels: true
